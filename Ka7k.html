<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>عيد مبارك — Mazen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
/* ──────────────────────────────────────────────
   ROOT + RESET
────────────────────────────────────────────── */
:root {
  --gold:       #D4AF37;
  --gold-light: #F5D97D;
  --gold-dim:   #8B6914;
  --cream:      #FFF8E7;
  --dark:       #070503;
  --dark2:      #0E0A05;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: auto; }

body {
  background: var(--dark);
  overflow-x: hidden;
  cursor: none;
}

/* ──────────────────────────────────────────────
   CANVAS (fixed fullscreen)
────────────────────────────────────────────── */
#c {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
  display: block;
}

/* ──────────────────────────────────────────────
   SCROLL SPACE
────────────────────────────────────────────── */
#scroll-space {
  height: 700vh;
  position: relative;
  z-index: 2;
  pointer-events: none;
}

/* ──────────────────────────────────────────────
   GRAIN OVERLAY
────────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 50;
  pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  animation: grain 0.5s steps(2) infinite;
}
@keyframes grain {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(-2%,-1%); }
  50%  { transform: translate(1%,2%); }
  75%  { transform: translate(-1%,1%); }
  100% { transform: translate(2%,-2%); }
}

/* ──────────────────────────────────────────────
   VIGNETTE
────────────────────────────────────────────── */
#vignette {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: radial-gradient(ellipse 90% 90% at 50% 50%,
    transparent 40%, rgba(7,5,3,0.5) 80%, rgba(7,5,3,0.85) 100%);
}

/* ──────────────────────────────────────────────
   CUSTOM CURSOR
────────────────────────────────────────────── */
#cursor {
  position: fixed;
  width: 8px;
  height: 8px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, opacity 0.2s;
  mix-blend-mode: difference;
  will-change: transform;
}
#cursor-ring {
  position: fixed;
  width: 32px;
  height: 32px;
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.4s, height 0.4s, border-color 0.3s;
  will-change: transform;
}

/* ──────────────────────────────────────────────
   LOADING SCREEN
────────────────────────────────────────────── */
#loading {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

.load-presents {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(13px, 2vw, 16px);
  color: rgba(212,175,55,0.7);
  letter-spacing: 10px;
  text-transform: uppercase;
  opacity: 0;
}
.load-title {
  font-family: 'Amiri', serif;
  font-size: clamp(32px, 6vw, 52px);
  color: var(--gold);
  opacity: 0;
  text-shadow: 0 0 40px rgba(212,175,55,0.5);
  letter-spacing: 4px;
}
.load-bar-wrap {
  width: 180px;
  height: 1px;
  background: rgba(212,175,55,0.15);
  overflow: hidden;
  opacity: 0;
}
.load-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light));
}

/* ──────────────────────────────────────────────
   SCENE LABEL (top center)
────────────────────────────────────────────── */
#scene-label {
  position: fixed;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.scene-num {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 10px;
  color: rgba(212,175,55,0.4);
  letter-spacing: 6px;
  text-transform: uppercase;
  display: block;
}
.scene-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 13px;
  color: rgba(212,175,55,0.6);
  letter-spacing: 4px;
  text-transform: uppercase;
  display: block;
  margin-top: 3px;
}

/* ──────────────────────────────────────────────
   SIDE PROGRESS DOTS
────────────────────────────────────────────── */
#dots {
  position: fixed;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 14px;
  opacity: 0;
  transition: opacity 0.5s;
}
.dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(212,175,55,0.25);
  transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
  cursor: none;
}
.dot.active {
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
  height: 18px;
  border-radius: 2px;
}

/* ──────────────────────────────────────────────
   SCROLL HINT
────────────────────────────────────────────── */
#scroll-hint {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.8s;
  pointer-events: none;
}
.sh-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px;
  color: rgba(212,175,55,0.45);
  letter-spacing: 5px;
  text-transform: uppercase;
}
.sh-line {
  width: 1px;
  height: 36px;
  background: linear-gradient(to bottom, rgba(212,175,55,0.5), transparent);
  animation: shPulse 2.2s ease-in-out infinite;
}
@keyframes shPulse {
  0%,100% { opacity:0.3; transform: scaleY(1); }
  50%      { opacity:1.0; transform: scaleY(1.1); }
}

/* ──────────────────────────────────────────────
   MESSAGE OVERLAY
────────────────────────────────────────────── */
#msg-overlay {
  position: fixed;
  inset: 0;
  z-index: 15;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.msg-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  margin: 16px 0;
}
.msg-main {
  font-family: 'Amiri', serif;
  font-size: clamp(52px, 9vw, 100px);
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  line-height: 1.2;
  opacity: 0;
  transform: translateY(24px);
  text-shadow:
    0 0 40px rgba(212,175,55,0.9),
    0 0 80px rgba(212,175,55,0.5),
    0 0 120px rgba(212,175,55,0.25);
  letter-spacing: 4px;
}
.msg-sub {
  font-family: 'Amiri', serif;
  font-size: clamp(22px, 4vw, 40px);
  font-weight: 400;
  color: rgba(245,217,125,0.85);
  text-align: center;
  opacity: 0;
  transform: translateY(18px);
  letter-spacing: 2px;
}
.msg-from {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(13px, 2vw, 17px);
  color: rgba(212,175,55,0.45);
  letter-spacing: 8px;
  text-transform: uppercase;
  opacity: 0;
  margin-top: 4px;
}

/* ──────────────────────────────────────────────
   NAME HINT
────────────────────────────────────────────── */
#name-hint {
  position: fixed;
  top: 20px;
  right: 28px;
  z-index: 20;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px;
  color: rgba(212,175,55,0.2);
  letter-spacing: 2px;
  opacity: 0;
  pointer-events: none;
}

/* ──────────────────────────────────────────────
   MOBILE
────────────────────────────────────────────── */
@media (max-width: 600px) {
  #dots { right: 14px; }
  .msg-main { font-size: clamp(40px,11vw,72px); }
  .msg-sub  { font-size: clamp(18px,5vw,30px); }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <span class="load-presents" id="lp">Mazen presents</span>
  <span class="load-title" id="lt">عيد مبارك</span>
  <div class="load-bar-wrap" id="lbw">
    <div class="load-bar" id="lb"></div>
  </div>
</div>

<!-- Scroll Space (drives camera via scrollY) -->
<div id="scroll-space"></div>

<!-- Vignette -->
<div id="vignette"></div>

<!-- Custom Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Scene Label -->
<div id="scene-label">
  <span class="scene-num" id="sl-num">I</span>
  <span class="scene-name" id="sl-name">The Arrival</span>
</div>

<!-- Progress Dots -->
<div id="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- Scroll Hint -->
<div id="scroll-hint">
  <span class="sh-text">scroll</span>
  <div class="sh-line"></div>
</div>

<!-- Message Overlay -->
<div id="msg-overlay">
  <div class="msg-main" id="mm"></div>
  <div class="msg-divider" id="md1"></div>
  <div class="msg-sub" id="ms">كل عام وأنتم بخير</div>
  <div class="msg-divider" id="md2"></div>
  <div class="msg-from" id="mf">From Mazen</div>
</div>

<!-- Name hint -->
<div id="name-hint">?name=YourName</div>

<!-- Canvas -->
<canvas id="c"></canvas>

<script>
/* ═══════════════════════════════════════════════════════════
   PREMIUM EID AL-FITR EXPERIENCE
   A cinematic, scroll-driven 3D ka7k (Eid cookie) journey
   Built with Three.js + GSAP | © Mazen 2025
═══════════════════════════════════════════════════════════ */

// ─── Custom name ───────────────────────────────────────────
const params = new URLSearchParams(location.search);
const guestName = params.get('name');
document.getElementById('mm').textContent = guestName
  ? `عيد مبارك يا ${guestName}`
  : 'عيد مبارك';
if (!guestName) {
  document.getElementById('name-hint').style.opacity = '1';
  document.getElementById('name-hint').style.transition = 'opacity 1s 4s';
}

// ─── Utilities ─────────────────────────────────────────────
const lerp  = (a,b,t) => a + (b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi,v));
const ease  = t => t<0.5 ? 2*t*t : -1+(4-2*t)*t;   // smooth-step
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── Renderer ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputEncoding = THREE.sRGBEncoding;

// ─── Scene + Camera ────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070503);
scene.fog = new THREE.FogExp2(0x070503, 0.032);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 22, 42);

// ─── Lights ────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x1a0e04, 0.4);
scene.add(ambient);

// Main key spotlight
const key = new THREE.SpotLight(0xFFD08A, 0, 60, Math.PI/7, 0.4, 1.2);
key.position.set(4, 18, 6);
key.castShadow = true;
key.shadow.mapSize.setScalar(2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 50;
key.shadow.bias = -0.001;
const keyTarget = new THREE.Object3D(); keyTarget.position.set(0,0,0);
scene.add(keyTarget); key.target = keyTarget;
scene.add(key);

// Fill
const fill = new THREE.PointLight(0xFF8833, 0, 40);
fill.position.set(-9, 6, 7); scene.add(fill);

// Rim
const rim = new THREE.PointLight(0xFFCC55, 0, 30);
rim.position.set(2, 3, -9); scene.add(rim);

// Bounce
const bounce = new THREE.PointLight(0xFF9922, 0, 22);
bounce.position.set(0, -2.5, 2); scene.add(bounce);

// Celebration lights
const cel1 = new THREE.PointLight(0xFFD700, 0, 80); cel1.position.set(16, 22, 4); scene.add(cel1);
const cel2 = new THREE.PointLight(0xFF6600, 0, 80); cel2.position.set(-16, 18, -4); scene.add(cel2);
const cel3 = new THREE.PointLight(0xFFAA00, 0, 60); cel3.position.set(0, 26, -12); scene.add(cel3);

// ─── Floor (for physics) ───────────────────────────────────
const FLOOR_Y = -3.8;
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshPhysicalMaterial({ color:0x0C0805, roughness:0.95, metalness:0.05 })
);
floorMesh.rotation.x = -Math.PI/2;
floorMesh.position.y = FLOOR_Y;
floorMesh.receiveShadow = true;
floorMesh.visible = false;
scene.add(floorMesh);

// ─── Tray ──────────────────────────────────────────────────
const trayMat = new THREE.MeshPhysicalMaterial({
  color:0xC8941C, roughness:0.18, metalness:0.88,
  reflectivity:1, clearcoat:0.3, clearcoatRoughness:0.2,
});
const trayGroup = new THREE.Group();

// Base plate
const trayBase = new THREE.Mesh(
  new THREE.CylinderGeometry(5.2, 5.0, 0.18, 72),
  trayMat
);
trayBase.castShadow = true; trayBase.receiveShadow = true;
trayGroup.add(trayBase);

// Raised rim
const trayRim = new THREE.Mesh(
  new THREE.TorusGeometry(5.1, 0.28, 20, 80),
  trayMat
);
trayRim.rotation.x = Math.PI/2; trayRim.position.y = 0.12;
trayRim.castShadow = true; trayGroup.add(trayRim);

// Decorative concentric rings
[3.8, 2.5, 1.2].forEach(r => {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.04, 8, 64),
    trayMat
  );
  ring.rotation.x = Math.PI/2; ring.position.y = 0.12;
  trayGroup.add(ring);
});

// Ornamental dots on outer rim
for (let i=0; i<20; i++) {
  const a = (i/20)*Math.PI*2;
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 8, 8),
    trayMat
  );
  dot.position.set(Math.cos(a)*4.9, 0.32, Math.sin(a)*4.9);
  trayGroup.add(dot);
}

// Center medallion
const medal = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6, 0.6, 0.06, 32),
  trayMat
);
medal.position.y = 0.14; trayGroup.add(medal);

trayGroup.position.y = 0.2;
scene.add(trayGroup);

// ─── Ka7k (Eid Cookies) ────────────────────────────────────
const COOKIE_DEFS = [
  { x:0,    y:0.5,  z:0,    s:1.1,  rx:0.08, ry:0.0,  rz:0   },
  { x:2.0,  y:0.42, z:0.3,  s:0.95, rx:0.05, ry:1.2,  rz:0.1 },
  { x:-2.0, y:0.42, z:-0.3, s:0.95, rx:0.04, ry:-0.8, rz:-0.05},
  { x:0.3,  y:0.42, z:2.0,  s:0.95, rx:0.06, ry:0.5,  rz:0.08},
  { x:-0.3, y:0.42, z:-2.0, s:0.9,  rx:0.03, ry:-0.3, rz:-0.06},
  { x:1.4,  y:0.85, z:1.4,  s:0.88, rx:0.15, ry:2.1,  rz:0.12},
  { x:-1.4, y:0.85, z:-1.4, s:0.88, rx:0.1,  ry:0.9,  rz:-0.08},
  { x:1.4,  y:0.85, z:-1.4, s:0.85, rx:0.12, ry:-1.5, rz:0.1 },
  { x:-1.4, y:0.85, z:1.4,  s:0.85, rx:0.08, ry:3.0,  rz:-0.1},
  { x:3.5,  y:0.38, z:0.8,  s:0.78, rx:0.18, ry:1.8,  rz:0.15},
  { x:-3.5, y:0.38, z:-0.8, s:0.78, rx:0.14, ry:-0.6, rz:-0.12},
];

const cookieObjects = [];

function buildKa7k({ x, y, z, s, rx, ry, rz }) {
  const group = new THREE.Group();
  const R = 0.58 * s, T = 0.21 * s;

  // Randomize cookie color slightly
  const hue = 0.07 + (Math.random()-0.5)*0.02;
  const sat = 0.55 + Math.random()*0.15;
  const col = new THREE.Color().setHSL(hue, sat, 0.52);

  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: col,
    roughness: 0.78,
    metalness: 0.04,
    clearcoat: 0.08,
    clearcoatRoughness: 0.85,
  });

  // Main cookie ring
  const body = new THREE.Mesh(new THREE.TorusGeometry(R, T, 18, 64), bodyMat);
  body.castShadow = true; body.receiveShadow = true;
  group.add(body);

  // Powdered sugar coating (slightly larger, white, semi-transparent)
  const sugarMat = new THREE.MeshPhysicalMaterial({
    color:0xFFFAF0, roughness:1.0, metalness:0,
    transparent:true, opacity:0.55,
  });
  group.add(new THREE.Mesh(new THREE.TorusGeometry(R, T*1.06, 18, 64), sugarMat));

  // Sesame seed bumps
  const seedMat = new THREE.MeshPhysicalMaterial({ color:0xD4A96A, roughness:0.9 });
  for (let i=0; i<14; i++) {
    const a = (i/14)*Math.PI*2;
    const seed = new THREE.Mesh(new THREE.SphereGeometry(0.035*s, 5,5), seedMat);
    seed.position.set(
      Math.cos(a)*(R + T*0.45),
      (Math.random()-0.5)*T*0.6,
      Math.sin(a)*(R + T*0.45)
    );
    seed.scale.set(1,0.5,1);
    group.add(seed);
  }

  // Hollow inner glow effect (small emissive torus inside hole)
  const glowMat = new THREE.MeshBasicMaterial({
    color:0xFFCC55, transparent:true, opacity:0.08
  });
  const inner = new THREE.Mesh(new THREE.TorusGeometry(R*0.5, 0.03, 8, 32), glowMat);
  group.add(inner);

  group.position.set(x,y,z);
  group.rotation.set(rx,ry,rz);

  trayGroup.add(group);
  cookieObjects.push({
    mesh: group,
    origPos: new THREE.Vector3(x,y,z),
    origRot: new THREE.Euler(rx,ry,rz),
    vel: new THREE.Vector3(),
    angVel: new THREE.Vector3(
      (Math.random()-0.5)*0.06,
      (Math.random()-0.5)*0.06,
      (Math.random()-0.5)*0.06
    ),
    radius: R + T + 0.05,
    physics: false,
    settled: false,
  });
}

COOKIE_DEFS.forEach(buildKa7k);

// ─── Background Stars ──────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 1200;
const starPos = new Float32Array(starCount * 3);
for (let i=0; i<starCount; i++) {
  starPos[i*3]   = (Math.random()-0.5)*300;
  starPos[i*3+1] = (Math.random()-0.5)*150;
  starPos[i*3+2] = -80 - Math.random()*60;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  color:0xFFE8A0, size:0.06, transparent:true, opacity:0.4,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
}));
scene.add(stars);

// ─── Dust / Sugar Particles ────────────────────────────────
const DUST = 1000;
const dustGeo = new THREE.BufferGeometry();
const dPos   = new Float32Array(DUST*3);
const dPhase = new Float32Array(DUST);
for (let i=0; i<DUST; i++) {
  const r = 2 + Math.random()*10;
  const a = Math.random()*Math.PI*2;
  dPos[i*3]   = Math.cos(a)*r;
  dPos[i*3+1] = (Math.random()-0.25)*10;
  dPos[i*3+2] = Math.sin(a)*r;
  dPhase[i]   = Math.random()*Math.PI*2;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
const dustMat = new THREE.PointsMaterial({
  color:0xFFE8B0, size:0.04, transparent:true, opacity:0.55,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ─── Crumb Particles (physics scatter) ────────────────────
const CRUMB = 600;
const crumbGeo = new THREE.BufferGeometry();
const crPos = new Float32Array(CRUMB*3);
const crVel = []; const crActive = new Uint8Array(CRUMB);
for (let i=0; i<CRUMB; i++) {
  crPos[i*3]=crPos[i*3+1]=crPos[i*3+2]=0;
  crVel.push({ x:0, y:0, z:0, alive:0 });
}
crumbGeo.setAttribute('position', new THREE.BufferAttribute(crPos, 3));
const crumbs = new THREE.Points(crumbGeo, new THREE.PointsMaterial({
  color:0xFFCC80, size:0.06, transparent:true, opacity:0,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
}));
scene.add(crumbs);

// ─── Fireworks ─────────────────────────────────────────────
const FW_COUNT = 2000;
const fwGeo = new THREE.BufferGeometry();
const fwPos = new Float32Array(FW_COUNT*3);
const fwCol = new Float32Array(FW_COUNT*3);
const fwVel = [];

const fwPalette = [
  [1.0,0.84,0.0],[1.0,0.65,0.0],[1.0,0.9,0.4],
  [1.0,1.0,0.8],[0.9,0.75,0.2],[1.0,0.5,0.1],
];
for (let i=0; i<FW_COUNT; i++) {
  fwPos[i*3]=fwPos[i*3+1]=fwPos[i*3+2]=0;
  const c = fwPalette[i % fwPalette.length];
  fwCol[i*3]=c[0]; fwCol[i*3+1]=c[1]; fwCol[i*3+2]=c[2];
  const spd = 0.06 + Math.random()*0.28;
  const th  = Math.random()*Math.PI*2;
  const ph  = Math.acos(2*Math.random()-1);
  fwVel.push({
    x: spd*Math.sin(ph)*Math.cos(th),
    y: spd*Math.sin(ph)*Math.sin(th)*0.7+0.03,
    z: spd*Math.cos(ph),
    d: 0.93+Math.random()*0.04,
    active:false
  });
}
fwGeo.setAttribute('position', new THREE.BufferAttribute(fwPos, 3));
fwGeo.setAttribute('color', new THREE.BufferAttribute(fwCol, 3));
const fwMat = new THREE.PointsMaterial({
  vertexColors:true, size:0.14, transparent:true, opacity:0,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
});
const fwMesh = new THREE.Points(fwGeo, fwMat);
scene.add(fwMesh);

let fwTimer=0, fwAlive=false;

const FW_CENTERS = [
  [0,9,0],[-7,13,-3],[7,11,4],[0,15,-6],[4,10,6],[-4,14,3]
];

function launchFW() {
  fwTimer=0; fwAlive=true; fwMat.opacity=1;
  const grp = Math.floor(Math.random()*FW_CENTERS.length);
  const c   = FW_CENTERS[grp];
  for (let i=0; i<FW_COUNT; i++) {
    const ci = (i+grp*333)%FW_CENTERS.length;
    const cc = FW_CENTERS[ci];
    fwPos[i*3]  = cc[0]+(Math.random()-0.5)*1.5;
    fwPos[i*3+1]= cc[1]+(Math.random()-0.5)*1.5;
    fwPos[i*3+2]= cc[2]+(Math.random()-0.5)*1.5;
    fwVel[i].active=true;
  }
  fwGeo.attributes.position.needsUpdate=true;
}

function tickFW() {
  if (!fwAlive) return;
  fwTimer++;
  for (let i=0; i<FW_COUNT; i++) {
    const v=fwVel[i]; if(!v.active) continue;
    fwPos[i*3]  += v.x; v.x*=v.d;
    fwPos[i*3+1]+= v.y; v.y*=v.d; v.y-=0.0003*fwTimer;
    fwPos[i*3+2]+= v.z; v.z*=v.d;
  }
  fwGeo.attributes.position.needsUpdate=true;
  if (fwTimer>100) { fwMat.opacity=Math.max(0,fwMat.opacity-0.012); cel1.intensity*=0.97; cel2.intensity*=0.97; cel3.intensity*=0.97; }
  if (fwTimer>160) { fwAlive=false; setTimeout(launchFW,1800); }
}

// ─── Physics ───────────────────────────────────────────────
let physOn=false;
const GRAVITY=-0.0075, BOUNCE=0.3, FRICTION=0.975;

function activatePhysics() {
  if (physOn) return;
  physOn=true; floorMesh.visible=true;
  // Detach from trayGroup, re-attach to scene
  cookieObjects.forEach(obj => {
    const wp = new THREE.Vector3();
    obj.mesh.getWorldPosition(wp);
    const wr = new THREE.Euler();
    wr.setFromRotationMatrix(obj.mesh.matrixWorld);
    trayGroup.remove(obj.mesh);
    obj.mesh.position.copy(wp);
    obj.mesh.rotation.copy(wr);
    scene.add(obj.mesh);
    obj.vel.set((Math.random()-0.5)*0.14, 0.06+Math.random()*0.12, (Math.random()-0.5)*0.14);
    obj.physics=true; obj.settled=false;
  });
  // Spawn crumbs
  spawnCrumbs();
}

function deactivatePhysics() {
  if (!physOn) return;
  physOn=false; floorMesh.visible=false;
  cookieObjects.forEach(obj => {
    if (!obj.physics) return;
    obj.physics=false;
    scene.remove(obj.mesh);
    trayGroup.add(obj.mesh);
    gsap.to(obj.mesh.position, { x:obj.origPos.x, y:obj.origPos.y, z:obj.origPos.z, duration:2.2, ease:'power3.out' });
    gsap.to(obj.mesh.rotation, { x:obj.origRot.x, y:obj.origRot.y, z:obj.origRot.z, duration:2.2, ease:'power3.out' });
  });
  crumbs.material.opacity=0;
}

function spawnCrumbs() {
  for (let i=0; i<CRUMB; i++) {
    const obj = cookieObjects[i % cookieObjects.length];
    const wp = obj.mesh.position;
    crPos[i*3]  = wp.x+(Math.random()-0.5)*1.5;
    crPos[i*3+1]= wp.y+(Math.random()-0.5)*0.5;
    crPos[i*3+2]= wp.z+(Math.random()-0.5)*1.5;
    crVel[i].x=(Math.random()-0.5)*0.08;
    crVel[i].y=0.02+Math.random()*0.06;
    crVel[i].z=(Math.random()-0.5)*0.08;
    crVel[i].alive=1;
  }
  crumbGeo.attributes.position.needsUpdate=true;
  crumbs.material.opacity=0.7;
}

function tickPhysics() {
  if (!physOn) return;
  for (let i=0; i<cookieObjects.length; i++) {
    const o=cookieObjects[i];
    if (!o.physics||o.settled) continue;
    o.vel.y+=GRAVITY;
    o.mesh.position.addScaledVector(o.vel,1);
    o.mesh.rotation.x+=o.angVel.x;
    o.mesh.rotation.y+=o.angVel.y;
    o.mesh.rotation.z+=o.angVel.z;
    const floor=FLOOR_Y+o.radius;
    if (o.mesh.position.y<=floor) {
      o.mesh.position.y=floor;
      o.vel.y*=-BOUNCE;
      o.vel.x*=FRICTION; o.vel.z*=FRICTION;
      o.angVel.multiplyScalar(0.88);
      if (Math.abs(o.vel.y)<0.005) { o.vel.y=0; }
    }
    // Cookie-cookie collisions
    for (let j=i+1; j<cookieObjects.length; j++) {
      const b=cookieObjects[j]; if(!b.physics) continue;
      const dx=o.mesh.position.x-b.mesh.position.x;
      const dy=o.mesh.position.y-b.mesh.position.y;
      const dz=o.mesh.position.z-b.mesh.position.z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      const min=o.radius+b.radius+0.08;
      if (d<min && d>0.001) {
        const nx=dx/d, ny=dy/d, nz=dz/d;
        const ov=(min-d)*0.5;
        o.mesh.position.x+=nx*ov; o.mesh.position.y+=ny*ov; o.mesh.position.z+=nz*ov;
        b.mesh.position.x-=nx*ov; b.mesh.position.y-=ny*ov; b.mesh.position.z-=nz*ov;
        const rv=(o.vel.x-b.vel.x)*nx+(o.vel.y-b.vel.y)*ny+(o.vel.z-b.vel.z)*nz;
        const imp=rv*0.45;
        o.vel.x-=imp*nx; o.vel.y-=imp*ny; o.vel.z-=imp*nz;
        b.vel.x+=imp*nx; b.vel.y+=imp*ny; b.vel.z+=imp*nz;
      }
    }
  }
  // Crumbs
  let crAlive=false;
  for (let i=0; i<CRUMB; i++) {
    if (!crVel[i].alive) continue; crAlive=true;
    crPos[i*3]  +=crVel[i].x;
    crPos[i*3+1]+=crVel[i].y; crVel[i].y-=0.003;
    crPos[i*3+2]+=crVel[i].z;
    if (crPos[i*3+1]<FLOOR_Y) { crVel[i].alive=0; crPos[i*3+1]=FLOOR_Y; }
  }
  crumbGeo.attributes.position.needsUpdate=true;
  if (!crAlive && crumbs.material.opacity>0) {
    crumbs.material.opacity=Math.max(0,crumbs.material.opacity-0.005);
  }
}

// ─── Camera Path ───────────────────────────────────────────
const CAM_PATH = [
  { t:0.00, pos:[0,22,42],    tgt:[0,0,0]   },  // distant top
  { t:0.12, pos:[0,10,20],    tgt:[0,0.5,0] },  // reveal
  { t:0.27, pos:[14,6,12],    tgt:[0,0.3,0] },  // orbit right
  { t:0.42, pos:[-12,5,11],   tgt:[0,0.3,0] },  // orbit left
  { t:0.54, pos:[5,16,5],     tgt:[0,0,0]   },  // top-down before fall
  { t:0.67, pos:[6,8,18],     tgt:[0,0,0]   },  // pull back during fall
  { t:0.80, pos:[0,7,22],     tgt:[0,3,0]   },  // settle for message
  { t:0.92, pos:[0,8,24],     tgt:[0,4,0]   },  // celebration
  { t:1.00, pos:[0,9,26],     tgt:[0,5,0]   },
];

function getCamAt(t) {
  const kf=CAM_PATH;
  let i=0;
  while (i<kf.length-1 && kf[i+1].t<=t) i++;
  if (i>=kf.length-1) {
    const L=kf[kf.length-1];
    return { pos:new THREE.Vector3(...L.pos), tgt:new THREE.Vector3(...L.tgt) };
  }
  const a=kf[i], b=kf[i+1];
  const lt=ease((t-a.t)/(b.t-a.t));
  return {
    pos: new THREE.Vector3(lerp(a.pos[0],b.pos[0],lt),lerp(a.pos[1],b.pos[1],lt),lerp(a.pos[2],b.pos[2],lt)),
    tgt: new THREE.Vector3(lerp(a.tgt[0],b.tgt[0],lt),lerp(a.tgt[1],b.tgt[1],lt),lerp(a.tgt[2],b.tgt[2],lt)),
  };
}

// ─── Scroll State ──────────────────────────────────────────
let scrollT=0;
window.addEventListener('scroll', () => {
  const max=document.documentElement.scrollHeight-innerHeight;
  scrollT=clamp(window.scrollY/max,0,1);
}, { passive:true });

// ─── Mouse ─────────────────────────────────────────────────
const mouse={x:0,y:0,cx:innerWidth/2,cy:innerHeight/2};
document.addEventListener('mousemove', e => {
  mouse.x=(e.clientX/innerWidth-0.5)*2;
  mouse.y=-(e.clientY/innerHeight-0.5)*2;
  mouse.cx=e.clientX; mouse.cy=e.clientY;
});

// ─── Scene Transition ──────────────────────────────────────
const SCENE_LABELS=[
  { num:'I',   name:'The Arrival'  },
  { num:'II',  name:'The Reveal'   },
  { num:'III', name:'The Dance'    },
  { num:'IV',  name:'The Fall'     },
  { num:'V',   name:'The Blessing' },
];

let curScene=-1, msgVisible=false, celebOn=false;

function updateSceneMeta(t) {
  let s=0;
  if (t>0.10) s=1;
  if (t>0.35) s=2;
  if (t>0.55) s=3;
  if (t>0.75) s=4;
  if (s!==curScene) {
    curScene=s;
    document.getElementById('sl-num').textContent  = SCENE_LABELS[s].num;
    document.getElementById('sl-name').textContent = SCENE_LABELS[s].name;
    gsap.fromTo('#scene-label',{opacity:0},{opacity:1,duration:0.6});
    gsap.to('#scene-label',{opacity:0,duration:0.5,delay:3.5});
    // dots
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===s));
    // physics trigger
    if (s===3) activatePhysics();
    if (s!==3 && curScene===3) deactivatePhysics();
  }

  // Lighting reveal
  const lv=clamp((t-0.04)/0.18,0,1);
  key.intensity    = lv*3.2;
  fill.intensity   = lv*1.8;
  rim.intensity    = lv*1.2;
  bounce.intensity = lv*0.9;

  // Message overlay
  const msgT = clamp((t-0.74)/0.06,0,1);
  document.getElementById('msg-overlay').style.opacity=msgT;
  if (msgT>0.1 && !msgVisible) {
    msgVisible=true;
    gsap.to('#mm',  { opacity:1, y:0, duration:1.6, delay:0.1, ease:'power3.out' });
    gsap.to('#md1', { opacity:1, duration:1.2, delay:0.5 });
    gsap.to('#ms',  { opacity:1, y:0, duration:1.6, delay:0.7, ease:'power3.out' });
    gsap.to('#md2', { opacity:1, duration:1.2, delay:1.1 });
    gsap.to('#mf',  { opacity:1, duration:1.4, delay:1.3 });
  }
  if (msgT<0.05 && msgVisible) {
    msgVisible=false;
    gsap.set(['#mm','#ms','#md1','#md2','#mf'],{ opacity:0, y:24 });
    gsap.set(['#mf','#md1','#md2'],{ y:0 });
  }

  // Celebration
  if (t>0.84 && !celebOn) {
    celebOn=true;
    launchFW();
    gsap.to([cel1,cel2,cel3], { intensity:4, duration:0.3 });
  }
  if (t<0.84 && celebOn) {
    celebOn=false;
    fwAlive=false; fwMat.opacity=0;
    cel1.intensity=cel2.intensity=cel3.intensity=0;
  }
}

// ─── Camera lerp state ─────────────────────────────────────
const camCur = {
  pos: new THREE.Vector3(0,22,42),
  tgt: new THREE.Vector3(0,0,0),
};

// ─── Main Loop ─────────────────────────────────────────────
let t=0, ready=false;
const clock=new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  if (!ready) return;

  const dt=clock.getDelta();
  t+=dt;

  // Camera
  const want=getCamAt(scrollT);
  const PARA=0.25;
  const tx=want.pos.x+mouse.x*PARA;
  const ty=want.pos.y+mouse.y*PARA*0.5;
  camCur.pos.x=lerp(camCur.pos.x,tx,0.045);
  camCur.pos.y=lerp(camCur.pos.y,ty,0.045);
  camCur.pos.z=lerp(camCur.pos.z,want.pos.z,0.045);
  camCur.tgt.x=lerp(camCur.tgt.x,want.tgt.x,0.045);
  camCur.tgt.y=lerp(camCur.tgt.y,want.tgt.y,0.045);
  camCur.tgt.z=lerp(camCur.tgt.z,want.tgt.z,0.045);
  camera.position.copy(camCur.pos);
  camera.lookAt(camCur.tgt);

  // Tray gentle rotation (only when not in physics mode)
  if (!physOn) {
    trayGroup.rotation.y = t*0.08;
  }

  // Subtle cookie wave (scene 2-3)
  if (scrollT>0.25 && scrollT<0.55 && !physOn) {
    cookieObjects.forEach((o,i) => {
      o.mesh.position.y=o.origPos.y+Math.sin(t*1.4+i*0.7)*0.04;
      o.mesh.rotation.z=o.origRot.z+Math.sin(t*0.9+i*0.5)*0.015;
    });
  }

  // Dust float
  for (let i=0;i<DUST;i++) {
    dPos[i*3+1]+=Math.sin(t*0.6+dPhase[i])*0.0015;
    dPos[i*3]  +=Math.cos(t*0.4+dPhase[i])*0.001;
    if (dPos[i*3+1]>8) dPos[i*3+1]-=16;
  }
  dustGeo.attributes.position.needsUpdate=true;

  // Physics
  tickPhysics();
  // Fireworks
  tickFW();

  // Scene meta
  updateSceneMeta(scrollT);

  // Key light gentle sway
  key.position.x=Math.sin(t*0.2)*2+4;

  renderer.render(scene,camera);
}

// ─── Custom Cursor ─────────────────────────────────────────
const cur=document.getElementById('cursor');
const curRing=document.getElementById('cursor-ring');
let rx=innerWidth/2, ry=innerHeight/2;
document.addEventListener('mousemove', e => {
  rx=e.clientX; ry=e.clientY;
});
function tickCursor() {
  cur.style.left=rx+'px'; cur.style.top=ry+'px';
  // Ring lags behind
  const rrl = parseFloat(curRing.style.left||innerWidth/2);
  const rrt = parseFloat(curRing.style.top ||innerHeight/2);
  curRing.style.left=lerp(rrl,rx,0.1)+'px';
  curRing.style.top =lerp(rrt,ry,0.1)+'px';
  requestAnimationFrame(tickCursor);
}
tickCursor();

// ─── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ─── Loading Sequence ──────────────────────────────────────
async function intro() {
  const ld=document.getElementById('loading');
  const lp=document.getElementById('lp');
  const lt=document.getElementById('lt');
  const lb=document.getElementById('lb');
  const lbw=document.getElementById('lbw');

  await sleep(400);
  gsap.to(lp,  { opacity:1, duration:1.8, ease:'power2.inOut' });
  await sleep(600);
  gsap.to(lbw, { opacity:1, duration:0.8 });
  lb.style.transition='width 1.4s cubic-bezier(0.4,0,0.2,1)';
  lb.style.width='50%';
  await sleep(900);
  gsap.to(lt,  { opacity:1, duration:1.4, ease:'power2.inOut' });
  lb.style.width='85%';
  await sleep(1000);
  lb.style.width='100%';
  await sleep(600);

  gsap.to(ld, {
    opacity:0, duration:1.6, ease:'power2.inOut',
    onComplete: () => {
      ld.style.display='none';
      ready=true; clock.start();
      // Reveal HUD
      gsap.to('#scroll-hint',{ opacity:1, duration:1, delay:0.4 });
      gsap.to('#dots',      { opacity:1, duration:1, delay:0.6 });
      gsap.to('#scene-label',{ opacity:1, duration:1, delay:0.6 });
      // Initial light reveal
      gsap.to(key,   { intensity:2.5, duration:2.5, delay:0.5, ease:'power2.out' });
      gsap.to(fill,  { intensity:1.2, duration:2.5, delay:0.8 });
      gsap.to(rim,   { intensity:0.8, duration:2.5, delay:1.0 });
      gsap.to(bounce,{ intensity:0.6, duration:2.5, delay:1.2 });
      // Hide scroll hint after user scrolls
      window.addEventListener('scroll', () => {
        gsap.to('#scroll-hint',{opacity:0,duration:0.6});
      }, { once:true });
    }
  });
}

animate();
intro();
</script>
